name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  checks: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Require CI to have passed for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha="${GITHUB_SHA}"
          # GitHub Actions reports via check runs, not the legacy status API.
          # Poll briefly in case the main CI run for this commit is still finishing.
          conclusion=""
          for _ in $(seq 1 10); do
            conclusion=$(gh api \
              "repos/${GITHUB_REPOSITORY}/commits/${sha}/check-runs?check_name=ci" \
              -q '.check_runs | sort_by(.completed_at // "") | last | .conclusion // ""')
            echo "ci check conclusion: ${conclusion:-<pending>}"
            if [ -n "$conclusion" ]; then
              break
            fi
            sleep 15
          done
          if [ "$conclusion" != "success" ]; then
            echo "::error::CI check 'ci' did not succeed for ${sha} (conclusion: ${conclusion:-none}). Push tags only on commits whose main CI is green." >&2
            exit 1
          fi

      - name: Extract changelog section
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ ! -f CHANGELOG.md ]; then
            echo "CHANGELOG.md not found" >&2
            exit 1
          fi
          # Match the heading by literal string (index), not a dynamic regex, so
          # the dots in the semver version cannot act as regex wildcards.
          awk -v ver="$version" '
            index($0, "## [" ver "]") == 1 { flag = 1; next }
            flag && (/^## \[/ || /^\[[^]]+\]: /) { flag = 0 }
            flag { print }
          ' CHANGELOG.md \
            | sed -e '/./,$!d' \
            | tac | sed -e '/./,$!d' | tac \
            > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog section found for ${version}" >&2
            exit 1
          fi
          echo "Release notes for ${version}:"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
