name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Install Swift
        uses: swift-actions/setup-swift@364295d9c23900ce04d4e5cc708387921b4e50f9 # v3
        with:
          swift-version: "6.2.1"

      - name: Install dependencies
        run: |
          nix develop -c bun install --frozen-lockfile
          nix develop -c dart pub get --directory packages/dart-scanner --enforce-lockfile

      - name: just format-check
        run: nix develop -c just format-check

      - name: just lint
        run: nix develop -c just lint

      - name: just check
        run: nix develop -c just check

      - name: just typecheck
        run: nix develop -c just typecheck

  test-dist:
    name: test-dist
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      # nixpkgs only ships Swift 5.10 on Linux, which cannot build the scanner's
      # Swift 6 package, so the toolchain comes from setup-swift instead of nix.
      - name: Install Swift
        uses: swift-actions/setup-swift@364295d9c23900ce04d4e5cc708387921b4e50f9 # v3
        with:
          # When bumping this, also update the swift<version> segment in the
          # "Cache the Swift scanner build" key and restore-keys below. The
          # cached .build/swiftpm artifacts are compiled by this toolchain, so a
          # stale key would restore artifacts built by a different compiler.
          swift-version: "6.2.1"

      - name: Install Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: "3.11.6"

      - name: Install dependencies
        run: nix develop -c bun install --frozen-lockfile

      # Cache the SwiftPM build directory and dependency clones so swift-syntax
      # (the dominant compile cost) is reused across runs. The cache key is
      # pinned to Package.resolved, which pins the swift-syntax revision, so the
      # cache stays valid until the dependency is bumped. Debug artifacts only:
      # caching a release .build can corrupt incremental relinks
      # (swiftlang/swift-package-manager#8260), so the build below stays debug.
      - name: Cache the Swift scanner build
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            packages/swift-scanner/.build
            ~/.cache/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-swift6.2.1-${{ hashFiles('packages/swift-scanner/Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-swift6.2.1-

      # The Swift integration test spawns the bundled Swift scanner binary, so
      # build it (with the setup-swift toolchain, not nix) before the suite.
      # A debug build is used, not release: CI only needs a functional binary
      # for the test, debug compiles swift-syntax far faster, and `swift test`
      # below reuses the same debug artifacts instead of recompiling.
      - name: Build the Swift scanner
        run: swift build --package-path packages/swift-scanner

      - name: Test the Swift scanner
        run: swift test --package-path packages/swift-scanner

      # Build with the official SDK outside Nix so the Linux scanner remains
      # runnable on hosts without a Nix store.
      - name: Build the Dart scanner
        run: |
          cd packages/dart-scanner
          dart pub get --enforce-lockfile
          dart compile exe bin/speclink_dart_scanner.dart -o bin/speclink_dart_scanner

      - name: Test the Dart scanner
        run: |
          cd packages/dart-scanner
          dart test

      - name: just test
        run: nix develop -c just test

      - name: just build
        run: nix develop -c just build

      - name: Stage scanner binaries
        run: >-
          nix develop -c just stage-scanner-binaries
          --platform linux-x64
          --swift packages/swift-scanner/.build/debug/speclink-swift-scanner

      - name: just verify-dist
        run: nix develop -c just verify-dist

      - name: Pack and smoke-test npm package
        run: |
          tarball="$(npm pack)"
          nix develop -c just pack-smoke "$tarball"

  # Preserve the branch-protection check name while the expensive work runs in
  # parallel. This job succeeds only when both required workloads succeed.
  ci:
    name: ci
    if: always()
    needs: [quality, test-dist]
    runs-on: ubuntu-latest
    steps:
      - name: Require all CI workloads
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          TEST_DIST_RESULT: ${{ needs.test-dist.result }}
        run: |
          test "$QUALITY_RESULT" = success
          test "$TEST_DIST_RESULT" = success

  # Informational, never required for merge: runs `docbridge related --gate`
  # over the PR's whole change set and maintains one sticky comment so the
  # human approving the merge sees which linked counterparts were not updated.
  related-gate-report:
    name: related-gate-report
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Install dependencies
        run: nix develop -c bun install --frozen-lockfile

      - name: Run related-gate over the PR change set
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" --paginate \
            -q '.[].filename' > changed-files.txt
          gate_status=0
          nix develop -c bun run src/cli/index.ts related --stdin --gate \
            < changed-files.txt > gate-output.txt 2>&1 || gate_status=$?
          echo "GATE_STATUS=${gate_status}" >> "$GITHUB_ENV"
          cat gate-output.txt

      - name: Create or update the sticky PR comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          marker='<!-- docbridge-related-gate -->'
          {
            echo "$marker"
            echo "## DocBridge related-gate"
            echo
            if [ "$GATE_STATUS" = "0" ]; then
              echo "All linked counterparts of the changed files are part of this PR's change set."
            else
              echo "Changed files have linked counterparts that this PR does not update."
              echo "For each entry, either update the counterpart or make sure the PR explains why no update is needed."
              echo
              echo '```'
              cat gate-output.txt
              echo '```'
            fi
          } > comment.md
          comment_id="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate \
            -q ".[] | select(.body | startswith(\"${marker}\")) | .id" | head -n 1)"
          if [ -n "$comment_id" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" -F body=@comment.md
          else
            gh api -X POST "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" -F body=@comment.md
          fi
