name: Release Publish

# Runs when a `release/vX.Y.Z` pull request is merged into main: verifies CI is
# green, extracts the matching CHANGELOG section, and creates the git tag plus a
# GitHub Release in one step (no separate tag push, no PAT required).
#
# The merge of the release PR is the human approval gate. A workflow_dispatch
# fallback exists for recovery if the automatic run does not fire.

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (X.Y.Z), uses current main HEAD
        required: true

permissions:
  contents: write
  checks: read
  id-token: write

jobs:
  scanner-artifacts:
    name: scanner-artifacts (${{ matrix.platform }})
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.head_ref, 'release/'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
          - platform: darwin-arm64
            os: macos-15
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Install Swift on Linux
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@364295d9c23900ce04d4e5cc708387921b4e50f9 # v3
        with:
          swift-version: "6.2"

      - name: Install dependencies
        run: nix develop -c bun install --frozen-lockfile

      - name: Require expected runner platform
        env:
          EXPECTED_PLATFORM: ${{ matrix.platform }}
        run: |
          actual="$(nix develop -c bun -e "console.log(process.platform + '-' + process.arch)")"
          echo "runner platform: ${actual}"
          if [ "$actual" != "$EXPECTED_PLATFORM" ]; then
            echo "::error::Expected ${EXPECTED_PLATFORM}, got ${actual}." >&2
            exit 1
          fi

      - name: Build Swift scanner
        run: swift build --package-path packages/swift-scanner -c release

      - name: Build Dart scanner
        run: nix develop -c just build-dart-scanner

      - name: Build dist CLI
        run: nix develop -c just build

      # Must run after `just build`: building wipes `dist` (`rm -rf dist`), so
      # staging the scanner binaries first would delete them before packing.
      - name: Stage scanner binaries
        run: nix develop -c just stage-scanner-binaries --platform "${{ matrix.platform }}"

      - name: Verify dist package
        run: nix develop -c just verify-dist

      - name: Pack and smoke-test platform package
        run: |
          tarball="$(npm pack)"
          nix develop -c just pack-smoke "$tarball"

      - name: Generate scanner checksums
        run: |
          cd "dist/bin/${{ matrix.platform }}"
          shasum -a 256 speclink-swift-scanner speclink_dart_scanner > SHA256SUMS

      - name: Upload scanner artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scanner-${{ matrix.platform }}
          path: dist/bin/${{ matrix.platform }}
          if-no-files-found: error

  publish:
    # Only on a merged release PR, or any manual dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.head_ref, 'release/'))
    needs: scanner-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target commit and version
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "sha=" >> "$GITHUB_OUTPUT"   # checkout default (main HEAD)
            echo "version=${INPUT_VERSION#v}" >> "$GITHUB_OUTPUT"
          else
            # pull_request.closed: github.sha is the merge ref, not the commit
            # on main. Tag the actual merge commit instead.
            echo "sha=${MERGE_SHA}" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.target.outputs.sha }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Install dependencies
        run: nix develop -c bun install --frozen-lockfile

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ steps.target.outputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            version="$INPUT_VERSION"
          else
            version="$(node -p "require('./package.json').version")"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Publishing v${version}"

      - name: Require CI to have passed for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha="$(git rev-parse HEAD)"
          # GitHub Actions reports via check runs, not the legacy status API.
          # On a merge the CI run for the merge commit starts alongside this job,
          # so poll long enough to outlast a cold Nix CI run plus runner queueing
          # (40 x 15s = 10 min). The loop exits early once the check completes.
          conclusion=""
          for _ in $(seq 1 40); do
            conclusion=$(gh api \
              "repos/${GITHUB_REPOSITORY}/commits/${sha}/check-runs?check_name=ci" \
              -q '.check_runs | sort_by(.completed_at // "") | last | .conclusion // ""')
            echo "ci check conclusion: ${conclusion:-<pending>}"
            if [ -n "$conclusion" ]; then
              break
            fi
            sleep 15
          done
          if [ "$conclusion" != "success" ]; then
            echo "::error::CI check 'ci' did not succeed for ${sha} (conclusion: ${conclusion:-none})." >&2
            exit 1
          fi

      - name: Build dist CLI
        run: nix develop -c just build

      - name: Download linux scanner artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: scanner-linux-x64
          path: dist/bin/linux-x64

      - name: Download darwin scanner artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: scanner-darwin-arm64
          path: dist/bin/darwin-arm64

      - name: Restore scanner executable bits
        run: chmod 755 dist/bin/*/speclink-swift-scanner dist/bin/*/speclink_dart_scanner

      - name: Verify dist package
        run: nix develop -c just verify-dist

      - name: Dry-run npm package
        run: npm pack --dry-run

      - name: Pack npm package
        id: pack
        run: |
          tarball="$(npm pack)"
          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"

      - name: Smoke-test packed npm package
        run: nix develop -c just pack-smoke "${{ steps.pack.outputs.tarball }}" --skip-scanner-fixtures

      - name: Configure npm authentication
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is not set; cannot publish to npm." >&2
            exit 1
          fi
          # Write the auth token to the user-level .npmrc so `npm publish` can
          # authenticate. Provenance still comes from the workflow's OIDC token
          # (id-token: write) on this public repo.
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc

      - name: Publish npm package
        run: npm publish "${{ steps.pack.outputs.tarball }}" --provenance --access public

      - name: Extract changelog section
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "CHANGELOG.md not found" >&2
            exit 1
          fi
          # Match the heading by literal string (index), not a dynamic regex, so
          # the dots in the semver version cannot act as regex wildcards.
          awk -v ver="$VERSION" '
            index($0, "## [" ver "]") == 1 { flag = 1; next }
            flag && (/^## \[/ || /^\[[^]]+\]: /) { flag = 0 }
            flag { print }
          ' CHANGELOG.md \
            | sed -e '/./,$!d' \
            | tac | sed -e '/./,$!d' | tac \
            > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog section found for ${VERSION}" >&2
            exit 1
          fi
          echo "Release notes for ${VERSION}:"
          cat release-notes.md

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # gh release create also creates the git tag at --target, so no
          # separate tag push (and thus no PAT) is needed.
          gh release create "v${VERSION}" \
            --target "$(git rev-parse HEAD)" \
            --title "v${VERSION}" \
            --notes-file release-notes.md
