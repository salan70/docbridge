name: Bug report
description: Report a reproducible problem with DocBridge
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Non-trivial external pull requests require this issue to receive the `status: accepted` label before implementation begins.
  - type: checkboxes
    id: existing-issues
    attributes:
      label: Existing issues
      options:
        - label: I searched open and closed issues and did not find the same problem.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the observed behavior and why it is a problem.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide the smallest project, configuration, files, and commands that reproduce the problem.
      placeholder: |
        docbridge.config.json:
        ...

        Command:
        bunx docbridge check

        Output:
        ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Explain what you expected to happen instead.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: DocBridge version
      placeholder: 0.6.0
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Bun
        - Node.js
        - Both
        - Other or unknown
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Include the operating system, architecture, and relevant language toolchain versions.
      placeholder: macOS 15, arm64, Bun 1.3.13
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add logs, diagnostics, screenshots, or related links that help explain the problem.
  - type: dropdown
    id: contribution
    attributes:
      label: Are you interested in implementing a fix?
      options:
        - "No"
        - "Yes, after the issue is accepted"
        - Not sure
    validations:
      required: true
