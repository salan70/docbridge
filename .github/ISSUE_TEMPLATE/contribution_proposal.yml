name: Contribution proposal
description: Propose a non-trivial change before implementation begins
title: "[Proposal]: "
body:
  - type: markdown
    attributes:
      value: |
        Non-trivial external contributions require an issue with the `status: accepted` label before implementation begins. Describe the problem and desired outcome first; acceptance confirms scope, not guaranteed merge of a future pull request.
  - type: checkboxes
    id: existing-issues
    attributes:
      label: Existing issues
      options:
        - label: I searched open and closed issues and did not find an existing proposal for this problem.
          required: true
  - type: dropdown
    id: change-type
    attributes:
      label: Change type
      options:
        - New feature or user-visible behavior
        - CLI, configuration, schema, or diagnostic contract
        - Refactor or architectural change
        - Build, CI, release, or dependency change
        - Specification or documentation restructuring
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the concrete problem, affected users, and evidence that it exists.
    validations:
      required: true
  - type: textarea
    id: desired-outcome
    attributes:
      label: Desired outcome
      description: Describe the behavior or outcome that would solve the problem, without assuming a particular implementation.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Proposed scope
      description: Identify what should and should not change.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Explain existing features, workarounds, or smaller changes you considered and why they are insufficient.
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add examples, links, sketches, or compatibility constraints relevant to the decision.
  - type: checkboxes
    id: implementation-gate
    attributes:
      label: Implementation gate
      options:
        - label: "I will wait for the `status: accepted` label before opening a non-trivial pull request."
          required: true
