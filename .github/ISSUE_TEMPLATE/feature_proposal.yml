name: Feature proposal
description: Propose a new capability or user-visible improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this form for a new capability or user-visible improvement. Non-trivial implementation begins only after the issue receives the `status: accepted` label, regardless of who will implement it.
  - type: checkboxes
    id: existing-issues
    attributes:
      label: Existing issues
      options:
        - label: I searched open and closed issues and did not find the same feature proposal.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: Describe the concrete need, affected users, and current limitation.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence and context
      description: Provide examples, workflows, or other evidence that establishes the need.
    validations:
      required: true
  - type: textarea
    id: desired-behavior
    attributes:
      label: Desired behavior
      description: Describe the user-visible outcome without assuming a particular implementation.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Proposed scope
      description: Identify what should change.
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: Identify adjacent behavior that should remain unchanged.
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: List observable conditions that would make the feature complete.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Explain existing features, workarounds, or smaller changes and why they are insufficient.
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility and risks
      description: Identify compatibility constraints, migration concerns, or meaningful risks.
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add related specifications, examples, sketches, or implementation notes.
